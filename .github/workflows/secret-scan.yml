name: secret-scan

# Runs gitleaks on every push + PR. Fails the build if any secret
# pattern matches — config at `.gitleaks.toml`. This is the canonical
# line of defense; the local pre-commit hook (package.json →
# simple-git-hooks) is a nice-to-have on top, but CI is what MUST
# green before a merge.
#
# History scope: scans the diff between the PR base and HEAD on PRs,
# and the push range on pushes. Avoids re-scanning the entire commit
# history on every run (the repo's past was manually vetted after the
# April 2026 rotation incident).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install the gitleaks binary directly rather than using
      # gitleaks/gitleaks-action@v2 — that action gates private-org
      # repos behind a paid license, while the OSS binary is free
      # and equivalent.
      - name: Install gitleaks
        run: |
          VERSION=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      # Scan the checked-out working tree (`--no-git` skips the
      # historical archaeology that tends to surface stale false
      # positives). What matters for us is "does the NEW tip contain
      # a secret?" — which is exactly what this checks.
      - name: Run gitleaks
        run: gitleaks detect --source . --no-git --config .gitleaks.toml --redact --verbose --no-banner
